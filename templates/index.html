<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Clima em Tempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121214;
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .weather-card {
            background-color: #202024;
            border: 1px solid #323238;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .btn-custom {
            background-color: #00875f;
            color: #fff;
            border: none;
        }
        .btn-custom:hover {
            background-color: #00b37e;
            color: #fff;
        }
        .form-control {
            background-color: #121214;
            border: 1px solid #323238;
            color: #fff;
        }
        .form-control:focus {
            background-color: #121214;
            color: #fff;
            border-color: #00b37e;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="weather-card p-4 text-center">
                    <h2 class="mb-4"><i class="fa-solid fa-cloud-sun text-warning me-2"></i>Weather App</h2>
                    
                    <form method="POST" class="mb-4">
                        <div class="input-group">
                            <input type="text" name="cidade" class="form-control" placeholder="Digite o nome da cidade..." required>
                            <button class="btn btn-custom" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                        </div>
                    </form>

                    {% if erro %}
                        <div class="alert alert-danger" role="alert">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i>{{ erro }}
                        </div>
                    {% endif %}

                    {% if clima %}
                        <div class="mt-4">
                            <h3 class="fw-bold mb-1">{{ clima.name }}, {{ clima.sys.country }}</h3>
                            <p class="text-capitalize text-muted mb-3">{{ clima.weather[0].description }}</p>
                            
                            <h1 class="display-3 fw-bold my-3">{{ clima.main.temp | int }}°C</h1>

                            <div class="row mt-4 pt-3 border-top border-secondary">
                                <div class="col-6 border-end border-secondary">
                                    <h5><i class="fa-solid fa-droplet text-info me-2"></i>Umidade</h5>
                                    <p class="fs-5 mb-0 fw-bold">{{ clima.main.humidity }}%</p>
                                </div>
                                <div class="col-6">
                                    <h5><i class="fa-solid fa-wind text-secondary me-2"></i>Vento</h5>
                                    <p class="fs-5 mb-0 fw-bold">{{ (clima.wind.speed * 3.6) | int }} km/h</p>
                                </div>
                            </div>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
